name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Alle 'run'-Schritte laufen im Unterordner, in dem das Projekt liegt
defaults:
  run:
    working-directory: bike-navigator-flutter

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Projekt-Geruest erzeugen
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          flutter create --org com.example --project-name bike_navigator --platforms=android .
          rm -rf lib && cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - name: Berechtigungen ins Manifest einfuegen
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          xml = p.read_text()
          perms = """    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
          """
          xml = re.sub(r"(<manifest[^>]*>)", r"\1\n" + perms, xml, count=1)
          p.write_text(xml)
          print(xml)
          PY

      - name: Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      # Hinweis: 'uses'-Schritte ignorieren working-directory -> voller Pfad noetig
      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: bike-navigator-apk
          path: bike-navigator-flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
