name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Build Android APK
        working-directory: bike-navigator-flutter
        run: |
          flutter --version
          if [ ! -d android ]; then
            flutter create .
          fi
          flutter pub get
          yes | flutter doctor --android-licenses
          flutter doctor -v
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bike-navigator-apk
          path: bike-navigator-flutter/build/app/outputs/flutter-apk/app-release.apk
